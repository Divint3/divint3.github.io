n><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br><span class="line">199</span><br><span class="line">200</span><br><span class="line">201</span><br><span class="line">202</span><br><span class="line">203</span><br><span class="line">204</span><br><span class="line">205</span><br><span class="line">206</span><br><span class="line">207</span><br><span class="line">208</span><br><span class="line">209</span><br><span class="line">210</span><br><span class="line">211</span><br><span class="line">212</span><br><span class="line">213</span><br><span class="line">214</span><br><span class="line">215</span><br><span class="line">216</span><br><span class="line">217</span><br><span class="line">218</span><br><span class="line">219</span><br><span class="line">220</span><br><span class="line">221</span><br><span class="line">222</span><br><span class="line">223</span><br><span class="line">224</span><br><span class="line">225</span><br><span class="line">226</span><br><span class="line">227</span><br><span class="line">228</span><br><span class="line">229</span><br><span class="line">230</span><br><span class="line">231</span><br><span class="line">232</span><br><span class="line">233</span><br><span class="line">234</span><br><span class="line">235</span><br><span class="line">236</span><br><span class="line">237</span><br><span class="line">238</span><br><span class="line">239</span><br><span class="line">240</span><br><span class="line">241</span><br><span class="line">242</span><br><span class="line">243</span><br><span class="line">244</span><br><span class="line">245</span><br><span class="line">246</span><br><span class="line">247</span><br><span class="line">248</span><br><span class="line">249</span><br><span class="line">250</span><br><span class="line">251</span><br><span class="line">252</span><br><span class="line">253</span><br><span class="line">254</span><br><span class="line">255</span><br><span class="line">256</span><br><span class="line">257</span><br><span class="line">258</span><br><span class="line">259</span><br><span class="line">260</span><br><span class="line">261</span><br><span class="line">262</span><br><span class="line">263</span><br><span class="line">264</span><br><span class="line">265</span><br><span class="line">266</span><br><span class="line">267</span><br><span class="line">268</span><br><span class="line">269</span><br><span class="line">270</span><br><span class="line">271</span><br><span class="line">272</span><br><span class="line">273</span><br><span class="line">274</span><br><span class="line">275</span><br><span class="line">276</span><br><span class="line">277</span><br><span class="line">278</span><br><span class="line">279</span><br><span class="line">280</span><br><span class="line">281</span><br><span class="line">282</span><br><span class="line">283</span><br><span class="line">284</span><br><span class="line">285</span><br><span class="line">286</span><br><span class="line">287</span><br><span class="line">288</span><br><span class="line">289</span><br><span class="line">290</span><br><span class="line">291</span><br><span class="line">292</span><br><span class="line">293</span><br><span class="line">294</span><br><span class="line">295</span><br><span class="line">296</span><br><span class="line">297</span><br><span class="line">298</span><br><span class="line">299</span><br><span class="line">300</span><br><span class="line">301</span><br></pre></td><td class="code"><pre><span class="line">无论当前的OllyDbg窗口是什么，这些快捷键均有效： </span><br><span class="line">Ctrl+F2 - 重启程序，即重新启动被调试程序。如果当前没有调试的程序，OllyDbg会运行历史列表［history list］中的第一个程序。程序重启后，将会删除所有内存断点和硬件断点。</span><br><span class="line">译者注：从实际使用效果看，硬件断点在程序重启后并没有移除。</span><br><span class="line"></span><br><span class="line">Alt+F2 - 关闭，即关闭被调试程序。如果程序仍在运行，会弹出一个提示信息，询问您是否要关闭程序。</span><br><span class="line"> </span><br><span class="line">F3 - 弹出“打开32位.EXE文件”对话框［Open 32-bit .EXE file］，您可以选择可执行文件，并可以输入运行参数。</span><br><span class="line"> </span><br><span class="line">Alt+F5 - 让OllyDbg总在最前面。如果被调试程序在某个断点处发生中断，而这时调试程序弹出一个总在最前面的窗口（一般为模式消息或模式对话框［modal message or dialog］），它可能会遮住OllyDbg的一部分，但是我们又不能移动最小化这个窗口。激活OllyDbg（比如按任务栏上的标签）并按 Alt+F5，OllyDbg将设置成总在最前面，会反过来遮住刚才那个窗口。如果您再按一下Alt+F5，OllyDbg会恢复到正常状态。 OllyDbg是否处于总在最前面状态，将会保存，在下一次调试时依然有效。当前是否处于总在最前面状态，会显示在状态栏中。</span><br><span class="line"></span><br><span class="line">F7 - 单步步入到下一条命令，如果当前命令是一个函数［Call］，则会停在这个函数体的第一条命令上。如果当前命令是是含有REP前缀，则只执行一次重复操作。</span><br><span class="line"></span><br><span class="line">Shift+F7 - 与F7相同，但是如果被调试程序发生异常而中止，调试器会首先尝试步入被调试程序指定的异常处理（请参考忽略Kernel32中的内存非法访问）。</span><br><span class="line"></span><br><span class="line">Ctrl+F7 - 自动步入，在所有的函数调用中一条一条地执行命令（就像您按住F7键不放一样，只是更快一些）。当您执行其他一些单步命令，或者程序到达断点，或者发生异常时，自动步入过程都会停止。每次单步步入，OllyDbg都会更新所有的窗口。所以为了提高自动步入的速度，请您关闭不必要成窗口，对于保留的窗口最好尽量的小。按Esc键，可以停止自动步入。</span><br><span class="line"> </span><br><span class="line">F8 - 单步步过到下一条命令。如果当前命令是一个函数，则一次执行完这个函数（除非这个函数内部包含断点，或发生了异常）。如果当前命令是含有REP前缀，则会执行完重复操作，并停在下一条命令上。</span><br><span class="line"> </span><br><span class="line">Shift+F8 - 与F8相同，但是如果被调试程序发生异常而中止，调试器会首先尝试步过被调试程序指定的异常处理（请参考忽略Kernel32中的内存非法访问）。</span><br><span class="line">  </span><br><span class="line">Ctrl+F8 - 自动步过，一条一条的执行命令，但并不进入函数调用内部（就像您按住F8键不放一样，只是更快一些）。当您执行其他一些单步命令，或者程序到达断点，或者发生异常时，自动步过过程都会停止。每次单步步过，OllyDbg都会更新所有的窗口。所以为了提高自动步过的速度，请您关闭不必要成窗口，对于保留的窗口最好尽量的小。按Esc键，可以停止自动步过。</span><br><span class="line">  </span><br><span class="line">F9 - 让程序继续执行。</span><br><span class="line"></span><br><span class="line">Shift+F9 - 与F9相同，但是如果被调试程序发生异常而中止，调试器会首先尝试执行被调试程序指定的异常处理（请参考忽略Kernel32中的内存非法访问）。</span><br><span class="line"> </span><br><span class="line">Ctrl+F9 - 执行直到返回，跟踪程序直到遇到返回，在此期间不进入子函数也不更新CPU数据。因为程序是一条一条命令执行的，所以速度可能会慢一些。按Esc键，可以停止跟踪。</span><br><span class="line"> </span><br><span class="line">Alt+F9 - 执行直到返回到用户代码段，跟踪程序直到指令所属于的模块不在系统目录中，在此期间不进入子函数也不更新CPU数据。因为程序是一条一条执行的，所以速度可能会慢一些。按Esc键，可以停止跟踪。</span><br><span class="line"> </span><br><span class="line">Ctrl+F11 -Run跟踪步入，一条一条执行命令，进入每个子函数调用，并把寄存器的信息加入到Run跟踪的存储数据中。Run跟踪不会同步更新CPU窗口。</span><br><span class="line"></span><br><span class="line">F12 - 停止程序执行，同时暂停被调试程序的所有线程。请不要手动恢复线程运行，最好使用继续执行快捷键或菜单选项（像 F9）。</span><br><span class="line">  </span><br><span class="line">Ctrl+F12 - Run跟踪 步过，一条一条执行命令，但是不进入子函数调用，，并把寄存器的信息加入到Run跟踪的存储数据中。Run跟踪不会同步更新CPU窗口。</span><br><span class="line"> </span><br><span class="line">Esc - 如果当前处于自动运行或跟踪状态，则停止自动运行或跟踪；如果CPU显示的是跟踪数据，则显示真实数据。</span><br><span class="line"> </span><br><span class="line">Alt+B - 显示断点窗口。在这个窗口中，您可以编辑、删除、或跟进到断点处。 </span><br><span class="line">Alt+C - 显示CPU窗口。</span><br><span class="line">Alt+E - 显示模块列表［list of modules］。</span><br><span class="line"> </span><br><span class="line">Alt+K - 显示调用栈［Call stack］窗口。</span><br><span class="line"> </span><br><span class="line">Alt+L - 显示日志窗口。</span><br><span class="line">  </span><br><span class="line">Alt+M - 显示内存窗口。</span><br><span class="line"> </span><br><span class="line">Alt+O - 显示选项对话框［Options dialog］</span><br><span class="line"> </span><br><span class="line">Ctrl+P - 显示补丁窗口。</span><br><span class="line"> </span><br><span class="line">Ctrl+T - 打开 暂停 Run跟踪 对话框</span><br><span class="line">  </span><br><span class="line">Alt+X - 关闭 OllyDbg。</span><br><span class="line"> </span><br><span class="line">大多数窗口都支持以下的键盘命令：</span><br><span class="line"> </span><br><span class="line">Alt+F3 - 关闭当前窗口。</span><br><span class="line">c.&amp;vWmLSGE  </span><br><span class="line">Ctrl+F4 - 关闭当前窗口。 </span><br><span class="line">F5 - 最大化当前窗口或将当前窗口大小改为正常化。</span><br><span class="line"> </span><br><span class="line">F6 - 切换到下一个窗口。</span><br><span class="line"> </span><br><span class="line">Shift+F6 - 切换到前一个窗口。</span><br><span class="line"> </span><br><span class="line">F10 - 打开与当前窗口或面板相关的快捷菜单。</span><br><span class="line"> </span><br><span class="line">左方向键 - 显示窗口左方一个字节宽度的内容。</span><br><span class="line"> </span><br><span class="line">Ctrl+左方向键 - 显示窗口左方一栏的内容。</span><br><span class="line"> </span><br><span class="line">右方向键 - 显示窗口右方一个字节宽度的内容</span><br><span class="line"></span><br><span class="line">Ctrl+右方向键 - 显示窗口右方一栏的内容</span><br><span class="line"> </span><br><span class="line">反汇编窗口中的快捷键［Disassembler shortcuts］</span><br><span class="line"> </span><br><span class="line">当CPU窗口中的反汇编面板［Disassembler pane］处于激活状态时，您可以使用以下快捷键：</span><br><span class="line">  </span><br><span class="line">回车键 - 将选中的命令添加到命令历史［command history］中，如果当前命令是一个跳转、函数或者是转换表的一个部分，则进入到目的地址。</span><br><span class="line"> </span><br><span class="line">退格键 - 移除选中部分的自动分析信息。如果分析器将代码误识别为数据，这个快捷键就非常有用。请参考解码提示［decoding hints］.  </span><br><span class="line"></span><br><span class="line">Alt+退格键 - 撤消所选部分的修改，以备份数据的相应内容替换所选部分。仅当备份数据存在且与所选部分不同时可用。</span><br><span class="line"></span><br><span class="line">Ctrl+F1 -如果API帮助文件已经选择，将打开与首个选择行内的符号名相关联的帮助主题。</span><br><span class="line"> </span><br><span class="line">F2 -在首个选择的命令上开关INT3 断点［Breakpoint］，也可以双击该行第二列。</span><br><span class="line">  </span><br><span class="line">Shift+F2 -在首个选择命令设置条件断点，参见忽略Kernel32中内存访问异常［Ignore memory access violations </span><br><span class="line">in Kernel32］。</span><br><span class="line"> </span><br><span class="line">F4 -执行到所选行，在首个选择的命令上设置一次性断点，然后继续执行调试程序，直到OllyDbg捕获到异常或者停止在该断点上。在程序执行到该命令之前，该一次性断点一直有效。如有必要，可在断点窗口［Breakpoints </span><br><span class="line">window］中删除它。</span><br><span class="line"> </span><br><span class="line">Shift+F4 -设置记录断点（一种条件断点，当条件满足时一些表达式的值会记录下来）， 详情参见断点［Breakpoint］。</span><br><span class="line">  </span><br><span class="line">Ctrl+F5 -打开与首个选择的命令相对应的源文件。</span><br><span class="line"> </span><br><span class="line">Alt+F7 -转到上一个找到的参考。</span><br><span class="line">  </span><br><span class="line">Alt+F8 -转到下一个找到参考。</span><br><span class="line"> </span><br><span class="line">Ctrl+A -分析当前模块的代码段。</span><br><span class="line"></span><br><span class="line">Ctrl+B - 开始二进制搜索。</span><br><span class="line"> </span><br><span class="line">Ctrl+C -复制所选内容到剪贴板。复制时会简单地按列宽截断不可见内容，如果希望排除不需要的列，可把这些列的宽度调整到最小。</span><br><span class="line"> </span><br><span class="line">Ctrl+E -以二进制（十六进制）格式编辑所选内容。</span><br><span class="line"> </span><br><span class="line">Ctrl+F -开始命令搜索。</span><br><span class="line"> </span><br><span class="line">Ctrl+G -转到某地址。该命令将弹出输入地址或表达式的窗口。该命令不会修改 EIP。</span><br><span class="line"></span><br><span class="line">Ctrl+J -列出所有的涉及到该位置的调用和跳转，在您用这个功能之前，您必须使用分析代码功能。</span><br><span class="line">Ctrl+K - 查看与当前函数相关的调用树［Call tree］。在您用这个功能之前，您必须使用分析代码功能。</span><br><span class="line"></span><br><span class="line">Ctrl+L - 搜索下一个，重复上一次的搜索内容。</span><br><span class="line"> </span><br><span class="line">Ctrl+N - 打开当前模块的名称（标签）列表。</span><br><span class="line"></span><br><span class="line">Ctrl+O - </span><br><span class="line">扫描object文件。扫描Object文件。该命令会显示扫描Object文件对话框，您可以在该对话框中选择Object文件或者lib文件，并扫描这个文件，试图找到在实际代码段中用到的目标模块。</span><br><span class="line"> </span><br><span class="line">Ctrl+R </span><br><span class="line">-搜索所选命令的参考。该命令扫描激活模块的全部可执行代码，以找到涉及到首个选中的命令的全部相关参考（包括：常量、跳转及调用），您可以在参考中使用快捷键 </span><br><span class="line">Alt+F7 和 Alt+F8来浏览这些参考。为便于您使用，被参考的命令也包含在该列表中。</span><br><span class="line"></span><br><span class="line">Ctrl+S -命令搜索。该命令显示命令查找［Find command］对话框供您输入汇编命令，并从当前命令开始搜索。</span><br><span class="line"> </span><br><span class="line">星号［Asterisk］(*) -转到原始位置（激活线程的EIP处）。</span><br><span class="line"></span><br><span class="line">Ctrl+星号(*) - 指定新的起始位置，设置当前所选线程的EIP为首个选择字节的地址。您可以在选择EIP并撤消该操作。</span><br><span class="line"></span><br><span class="line">加号［Plus］(+) -如果run跟踪［run trace］ 没有激活，则根据命令历史［command </span><br><span class="line">history］跳到下一条运行过命令的地方；否则跳到Run跟踪的下一个记录。</span><br><span class="line"> </span><br><span class="line">Ctrl+加号 - 跳到前一个函数开始处。（注意只是跳到，并不执行）</span><br><span class="line"></span><br><span class="line">减号［Minus］(-) - 如果run跟踪［run trace］ 没有激活，则根据命令历史［command </span><br><span class="line">history］跳到前一条运行过命令的地方；否则跳到Run跟踪的前一个记录。</span><br><span class="line"></span><br><span class="line">Ctrl+减号 - 跳到下一个函数开始处。（注意只是跳到，并不执行）</span><br><span class="line"> </span><br><span class="line">空格［Space］ - </span><br><span class="line">修改命令。您可在显示对话框中以汇编语言修改实际指令或输入新指令，这些指令将替换实际代码，您也可以在想要修改的指令处双击鼠标。</span><br><span class="line">  </span><br><span class="line">冒号［Colon］( - 添加标签。显示添加标签窗口［Add label］或修改标签窗口［Change </span><br><span class="line">label］，您可在此输入与首个选择的命令中的第一个字节相关联的标签（符号名）。注意，在多种编程语言中，冒号可以是标签的一部分。</span><br><span class="line"></span><br><span class="line">分号［Semicolon］(;) - 添加注释［comment］。显示添加注释窗口［Add label］或修改注释窗口［Change </span><br><span class="line">label］，您可在此输入与首条所选命令的第一个字节相关联的注释（注释串会显示在最后一列中）。注意，多种汇编语言使用分号作为注释开始。您也可以在注释列双击需要注释的命令行。</span><br><span class="line"> </span><br><span class="line">命令行插件支持的命令</span><br><span class="line"> </span><br><span class="line">CALC</span><br><span class="line">判断表达式</span><br><span class="line"> </span><br><span class="line">WATCH</span><br><span class="line">添加监视表达式</span><br><span class="line"></span><br><span class="line">AT</span><br><span class="line">在指定地址进行反汇编</span><br><span class="line"></span><br><span class="line">FOLLOW</span><br><span class="line">跟随命令 </span><br><span class="line">ORIG</span><br><span class="line">反汇编于 EIP</span><br><span class="line"> </span><br><span class="line">DUMP</span><br><span class="line">在指定地址进行转存</span><br><span class="line"></span><br><span class="line">DA</span><br><span class="line">转存为反汇编代码</span><br><span class="line"> </span><br><span class="line">DB</span><br><span class="line">使用十六进制字节格式转存</span><br><span class="line"> </span><br><span class="line">DC</span><br><span class="line">使用 ASCII 格式转存</span><br><span class="line"></span><br><span class="line">DD</span><br><span class="line">转存在堆栈格式</span><br><span class="line"> </span><br><span class="line">DU</span><br><span class="line">转存在 UNICODE 格式</span><br><span class="line"></span><br><span class="line">DW</span><br><span class="line">使用十六进制字词格式转存</span><br><span class="line">  </span><br><span class="line">STK</span><br><span class="line"> </span><br><span class="line">AS</span><br><span class="line">（AS + 地址 + 字符串）</span><br><span class="line">在指定地址进行汇编</span><br><span class="line"> </span><br><span class="line">BP</span><br><span class="line">进行条件中断（有条件的断点）</span><br><span class="line"></span><br><span class="line">BPX</span><br><span class="line">中断在全部调用 （Call） </span><br><span class="line">BPD</span><br><span class="line">清除全部调用中的断点</span><br><span class="line"> </span><br><span class="line">BC</span><br><span class="line">清除断点</span><br><span class="line"> </span><br><span class="line">MR</span><br><span class="line">内存断点于访问时</span><br><span class="line"> </span><br><span class="line">MW</span><br><span class="line">内存断点于写入时</span><br><span class="line"> </span><br><span class="line">MD</span><br><span class="line">清除内存断点</span><br><span class="line"> </span><br><span class="line">HR</span><br><span class="line">访问时进行硬件中断</span><br><span class="line"> </span><br><span class="line">HW</span><br><span class="line">写入时进行硬件中断</span><br><span class="line"></span><br><span class="line">HE</span><br><span class="line">执行时进行硬件中断</span><br><span class="line"> </span><br><span class="line">HD</span><br><span class="line">清除硬件断点</span><br><span class="line"> </span><br><span class="line">STOP</span><br><span class="line">停止运行程序调试 </span><br><span class="line">PAUSE</span><br><span class="line">暂停执行程序调试</span><br><span class="line"> </span><br><span class="line">RUN</span><br><span class="line">运行程序进行调试</span><br><span class="line">  </span><br><span class="line">GE</span><br><span class="line">运行和通过例外</span><br><span class="line"></span><br><span class="line">SI</span><br><span class="line">单步     view     : 'FitH'
  };

  let fullURL = `/lib/pdf/web/viewer.html?file=${encodeURIComponent(url)}${pdfOpenFragment}`;

  if (NexT.utils.supportsPDFs()) {
    element.innerHTML = `<embed class="pdfobject" src="${url + pdfOpenFragment}" type="application/pdf" style="height: ${element.dataset.height};">`;
  } else {
    element.innerHTML = `<iframe src="${fullURL}" style="height: ${element.dataset.height};" frameborder="0"></iframe>`;
  }
});
</script>
